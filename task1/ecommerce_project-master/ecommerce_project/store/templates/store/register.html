{% extends 'store/base.html' %}
{% block content %}
<div class="auth-container">
  <h2>Create Account</h2>
  <form method="POST">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<span class="error">{{ field.errors }}</span>{% endif %}
      {% if field.help_text %}<small style="color:#888">{{ field.help_text }}</small>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary btn-large" style="width:100%">Register</button>
  </form>
  <p style="margin-top:16px;text-align:center">
    Already have an account? <a href="{% url 'login' %}">Login</a>
  </p>
</div>
{% endblock %}
